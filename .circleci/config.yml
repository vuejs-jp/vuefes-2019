version: 2.1
jobs:
  build:
    docker:
      - image: cimg/node:24.2

    working_directory: ~/repo

    steps:
      - checkout

      - run:
          name: Install dependencies
          command: corepack pnpm install --frozen-lockfile

      - run:
          name: Check
          command: corepack pnpm check

      - run:
          name: Test
          command: corepack pnpm test

      - run:
          name: Build
          command: corepack pnpm build

workflows:
  build:
    jobs:
      - build
